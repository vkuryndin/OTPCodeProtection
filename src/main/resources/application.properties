spring.application.name=otp-service

server.port=8080

spring.jackson.time-zone=UTC

logging.level.root=INFO
logging.level.org.springframework.web=INFO

otp.generate-rate-limit.enabled=true
otp.generate-rate-limit.max-attempts=5
otp.generate-rate-limit.window-seconds=60

jwt.secret=
jwt.expiration-minutes=60

email.username=vkuryndin@gmail.com
email.from=vkuryndin@gmail.com
mail.smtp.host=smtp.gmail.com
mail.smtp.port=587
mail.smtp.auth=true
mail.smtp.starttls.enable=true
email.password=

telegram.bot-token=
telegram.api-url=https://api.telegram.org

telegram.bot-username=KuryndinOptServiceBot
telegram.bind-expiration-minutes=15


smpp.host=localhost
smpp.port=2775
smpp.system-id=smppclient1
smpp.password=password
smpp.system-type=OTP
smpp.source-addr=OTPService

logging.file.name=logs/otp-service.log

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n